name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force JS actions onto Node 24 even when they declare Node 20.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - run: bun run lint

  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - run: bun run check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - run: bun run test

  # Final gate: build the publishable package only once the checks pass.
  package:
    name: Package
    needs: [lint, typecheck, test]
    if: ${{ !cancelled() && needs.lint.result == 'success' && needs.typecheck.result == 'success' && needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Builds dist/ via svelte-package and validates the published surface
      # (exports map, types, file extensions) with publint.
      - run: bun run package

      - name: Upload package output
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7
          if-no-files-found: error
